version: '3.9'

# ─── Shared build context ─────────────────────────────────────────────────────
x-app-build: &app-build
  build: .

# ─── Per-network DB defaults ──────────────────────────────────────────────────
x-db-healthcheck: &db-healthcheck
  test: ['CMD-SHELL', 'pg_isready -U postgres']
  interval: 5s
  timeout: 5s
  retries: 5

services:

  # ═══════════════════════════════════════════════════════════════════════════
  # REDIS  (optional – enables shared rate-limit store across API instances)
  # Uncomment this service and set REDIS_URL=redis://redis:6379 in each API
  # service's environment block to activate the Redis rate-limit store.
  # ═══════════════════════════════════════════════════════════════════════════
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - '6379:6379'
  #   volumes:
  #     - redis-data:/data
  #   healthcheck:
  #     test: ['CMD', 'redis-cli', 'ping']
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5

  # ═══════════════════════════════════════════════════════════════════════════
  # TESTNET
  # ═══════════════════════════════════════════════════════════════════════════
  db-testnet:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: soroban_testnet
    ports:
      - '5432:5432'
    volumes:
      - pgdata-testnet:/var/lib/postgresql/data
    healthcheck: *db-healthcheck

  api-testnet:
    <<: *app-build
    ports:
      - '3000:3000'
    environment:
      STELLAR_NETWORK: testnet
      TESTNET_DATABASE_URL: postgresql://postgres:password@db-testnet:5432/soroban_testnet
      DATABASE_URL: postgresql://postgres:password@db-testnet:5432/soroban_testnet
      TESTNET_RPC_URL: https://soroban-testnet.stellar.org
      TESTNET_HORIZON_URL: https://horizon-testnet.stellar.org
      TESTNET_PASSPHRASE: "Test SDF Network ; September 2015"
      NODE_ENV: production
      PORT: 3000
    depends_on:
      db-testnet:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node dist/index.js"

  indexer-testnet:
    <<: *app-build
    environment:
      STELLAR_NETWORK: testnet
      TESTNET_DATABASE_URL: postgresql://postgres:password@db-testnet:5432/soroban_testnet
      DATABASE_URL: postgresql://postgres:password@db-testnet:5432/soroban_testnet
      TESTNET_RPC_URL: https://soroban-testnet.stellar.org
      TESTNET_HORIZON_URL: https://horizon-testnet.stellar.org
      TESTNET_PASSPHRASE: "Test SDF Network ; September 2015"
      INDEXER_POLL_INTERVAL_MS: 5000
      INDEXER_BATCH_SIZE: 100
    depends_on:
      db-testnet:
        condition: service_healthy
    command: node dist/indexer/run.js

  # ═══════════════════════════════════════════════════════════════════════════
  # MAINNET
  # ═══════════════════════════════════════════════════════════════════════════
  db-mainnet:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: soroban_mainnet
    ports:
      - '5433:5432'
    volumes:
      - pgdata-mainnet:/var/lib/postgresql/data
    healthcheck: *db-healthcheck
    profiles: [mainnet]

  api-mainnet:
    <<: *app-build
    ports:
      - '3001:3001'
    environment:
      STELLAR_NETWORK: mainnet
      MAINNET_DATABASE_URL: postgresql://postgres:password@db-mainnet:5432/soroban_mainnet
      DATABASE_URL: postgresql://postgres:password@db-mainnet:5432/soroban_mainnet
      # Set MAINNET_RPC_URL to your provider (e.g. Validation Cloud)
      MAINNET_RPC_URL: ${MAINNET_RPC_URL:-}
      MAINNET_HORIZON_URL: https://horizon.stellar.org
      MAINNET_PASSPHRASE: "Public Global Stellar Network ; September 2015"
      NODE_ENV: production
      PORT: 3001
    depends_on:
      db-mainnet:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node dist/index.js"
    profiles: [mainnet]

  indexer-mainnet:
    <<: *app-build
    environment:
      STELLAR_NETWORK: mainnet
      MAINNET_DATABASE_URL: postgresql://postgres:password@db-mainnet:5432/soroban_mainnet
      DATABASE_URL: postgresql://postgres:password@db-mainnet:5432/soroban_mainnet
      MAINNET_RPC_URL: ${MAINNET_RPC_URL:-}
      MAINNET_HORIZON_URL: https://horizon.stellar.org
      MAINNET_PASSPHRASE: "Public Global Stellar Network ; September 2015"
      INDEXER_POLL_INTERVAL_MS: 5000
      INDEXER_BATCH_SIZE: 100
    depends_on:
      db-mainnet:
        condition: service_healthy
    command: node dist/indexer/run.js
    profiles: [mainnet]

  # ═══════════════════════════════════════════════════════════════════════════
  # DEVNET  (local Stellar Quickstart)
  # ═══════════════════════════════════════════════════════════════════════════
  db-devnet:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: soroban_devnet
    ports:
      - '5434:5432'
    volumes:
      - pgdata-devnet:/var/lib/postgresql/data
    healthcheck: *db-healthcheck
    profiles: [devnet]

  api-devnet:
    <<: *app-build
    ports:
      - '3002:3002'
    environment:
      STELLAR_NETWORK: devnet
      DEVNET_DATABASE_URL: postgresql://postgres:password@db-devnet:5432/soroban_devnet
      DATABASE_URL: postgresql://postgres:password@db-devnet:5432/soroban_devnet
      DEVNET_RPC_URL: http://stellar-quickstart:8000/soroban/rpc
      DEVNET_HORIZON_URL: http://stellar-quickstart:8000
      DEVNET_PASSPHRASE: "Standalone Network ; February 2017"
      NODE_ENV: development
      PORT: 3002
    depends_on:
      db-devnet:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node dist/index.js"
    profiles: [devnet]

  indexer-devnet:
    <<: *app-build
    environment:
      STELLAR_NETWORK: devnet
      DEVNET_DATABASE_URL: postgresql://postgres:password@db-devnet:5432/soroban_devnet
      DATABASE_URL: postgresql://postgres:password@db-devnet:5432/soroban_devnet
      DEVNET_RPC_URL: http://stellar-quickstart:8000/soroban/rpc
      DEVNET_HORIZON_URL: http://stellar-quickstart:8000
      DEVNET_PASSPHRASE: "Standalone Network ; February 2017"
      INDEXER_POLL_INTERVAL_MS: 2000
      INDEXER_BATCH_SIZE: 50
    depends_on:
      db-devnet:
        condition: service_healthy
    command: node dist/indexer/run.js
    profiles: [devnet]

volumes:
  pgdata-testnet:
  pgdata-mainnet:
  pgdata-devnet:
  # redis-data:  # Uncomment when the redis service above is enabled
